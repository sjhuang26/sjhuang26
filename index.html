<html>
  <head>
    <title>@sjhuang26 Web Terminal</title>
    <link href="https://fonts.googleapis.com/css?family=Roboto+Mono" rel="stylesheet">
    <style>
      html, body {
        margin: 0;
        padding: 0;
      }
      
      body {
        font-family: 'Roboto Mono', sans-serif;
        background: #222;
        color: #FFF;
        display: flex;
        justify-content: center;
        align-items: center;
        align-content: center;
      }
      
      p {
        font-size: 300%;
      }
    </style>
  </head>
  <body>
    <p></p>
    <script>
      setInterval(() => {
        const dateDiff = new Date() - new Date("8/26/2003");
        const val = (dateDiff/1000/3600/24).toFixed(5);
        document.querySelector('p').textContent = val;
      }, 10);
    </script>
  </body>
</html>
